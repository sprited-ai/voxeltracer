<!DOCTYPE html>
<html>
  <head>
    <title>Voxelviewer</title>
    <style type='text/css'>
      html, body { margin: 0; padding: 0; }
      body { background-color: #dddddd; overflow: hidden; }
      #canvas-container {
        position: absolute;
        left: 0px;
        right: 0px;
        top: 0px;
        bottom: 0px;
        width: 100%;
        height: 100%;
      }
      #canvas-container canvas{
        width: 100%;
        height: 100%;
      }
      #drop-zone {
        position: absolute;
        left: 0px;
        right: 0px;
        top: 0px;
        bottom: 0px;
        width: 100%;
        height: 100%;
        background: rgba(25, 29, 49, 0.5);
        font-size: 30px;
        color: white;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-weight: 300;
        font-family: sans-serif;
        text-align: center;
        min-height:300px;
      }
      #drop-zone[hidden='true'] {
        display: none;
      }
      #drop-zone #drop-error {
        background: #ee1111;
        color: white;
        border-radius: 20px;
        padding: 10px;
        margin-top: 10px;
        font-size: 18px;
      }
      #drop-zone[error='false'] #drop-error {
        display: none;
      }
  	</style>
  </head>
  <body>
    <div id="canvas-container"></div>
    <div id="drop-zone" hidden="true">
        <div>👀</div>
        <div id="drop-instruction"></div>
        <div id="drop-error"></div>
    </div>


    <script id="shader-vs" type="x-shader/x-vertex">#version 300 es

      precision highp float;

      uniform vec3 ray00;

      uniform vec3 ray10;

      uniform vec3 ray01;

      uniform vec3 ray11;

      in vec3 a_vertex;

      out vec3 initialRay;

      void main() {

        vec2 t = a_vertex.xy + 0.5;

        initialRay = mix(mix(ray00, ray10, t.x), mix(ray01, ray11, t.x), t.y);

        gl_Position = vec4(a_vertex * 2.0, 1.0);

      }
    </script>
    <script id="shader-fs" type="x-shader/x-fragment">#version 300 es

      precision highp float;

      precision highp sampler3D;

      uniform sampler3D voxelTexture;

      uniform vec3 eye;

      uniform vec3 size;

      uniform vec3 center;

      uniform vec3 toLight;

      const ivec3 iZero = ivec3(0);

      const float INFINITY = 1.0e9;

      const float EPSILON = 0.0001;

      const int ITERATION_LIMIT = 130 * 3;

      in vec3 initialRay;

      out vec4 outColor;

      /**
       * Interect bounding box [2].
       */
      vec2 intersectBoundingBox(vec3 origin, vec3 ray, vec3 boxMin, vec3 boxMax) {
        vec3 tMin = (boxMin - origin) / ray;
        vec3 tMax = (boxMax - origin) / ray;
        vec3 t1 = min(tMin, tMax);
        vec3 t2 = max(tMin, tMax);
        float tNear = max(max(t1.x, t1.y), t1.z);
        float tFar = min(min(t2.x, t2.y), t2.z);
        return vec2(tNear, tFar);
      }

      /**
       * Fragment shader which ray traces 3D texture data using Digital
       * Differential Analyser (DDA) [1].

       *    origin ·
       *            ·
       *             ·
       *              ·
       *               ·
       *     gridPos┌───0───┬───────┐       Ex: size     = ( 2.0,  2.0)
       *            │    ·  │       │           center   = ( 1.0,  1.0)
       *            │     · │       │   x       origin   = (-1.2, -2.8)
       *            ├──────1┼───────┤────→      ray      = (0.42, 0.91)
       *            │       2       │           gridPos  = -center
       *            │       │·      │                    = (-1.0, -1.0)
       *            └───────┴─3─────┘           toOrigin = origin - gridPos
       *                    │  ·                         = (-0.2, -1.8)
       *                  y ↓   ·               side     = step(ray, 0.0)
       *                                                 = ( 1.0,  1.0)
       */
      void main() {

        vec3 ray = normalize(initialRay);

        vec3 color = vec3(0.0);

        vec3 gridPos = -center;

        vec3 boxNormal;

        // Intersect bounding box. Return value is in form of where tBox = [tNear, tFar]
        vec2 tBox = intersectBoundingBox(eye, ray, gridPos, gridPos + size);

        // @TODO What if the ray starts inside the grid.
        if (tBox.x <= 0.0 || tBox.x > tBox.y) {
            // Did not intersect
            return;
        }

        // The t for hitting bounding box
        float boxT = tBox.x;

        // Pick origin just short of intersection point
        vec3 origin = eye + ray * (boxT - EPSILON);

        // Origin from perspective of the grid (0, 0) position
        vec3 toOrigin = origin - gridPos;

        // Compute delta t
        vec3 deltaT = 1.0 / ray * sign(ray);

        // Get side offsetter
        vec3 side = step(0.0, ray);

        // Find the first t set
        vec3 tSet = (floor(toOrigin) + side - toOrigin) / ray;

        // Cell index (starts right outside of the bound)
        ivec3 cellIndex = ivec3(floor(toOrigin));

        // Normal
        vec3 normal;

        for (int it = 0; it < ITERATION_LIMIT; ++it) {

          // Find minimum component of tSet
          float minT = min(tSet.x, min(tSet.y, tSet.z));

          if (tSet.x == minT) {
              tSet.x += deltaT.x;
              cellIndex.x += int(sign(ray.x));
              normal = vec3(-sign(ray.x), 0.0, 0.0);
          }
          else if (tSet.y == minT) {
              tSet.y += deltaT.y;
              cellIndex.y += int(sign(ray.y));
              normal = vec3(0.0, -sign(ray.y), 0.0);
          }
          else {
              tSet.z += deltaT.z;
              cellIndex.z += int(sign(ray.z));
              normal = vec3(0.0, 0.0, -sign(ray.z));
          }

          // If some condition is met break from the loop (allow one extra padding)
          if (any(lessThan(cellIndex, iZero - 1)) || any(greaterThanEqual(cellIndex, ivec3(size) + 1))){
            break;
          }
          // If within bound, then texture lookup.
          else if (all(greaterThanEqual(cellIndex, iZero)) && all(lessThan(cellIndex, ivec3(size)))) {
            vec4 voxelColor = texture( voxelTexture, (vec3(cellIndex) + 0.5) / size);
            if (voxelColor.w > 0.5) {

              // @TODO Shadow ray.

              color = voxelColor.xyz * (max(dot(normal, toLight), 0.0) * 0.8 + 0.2);
              break;
            }
          }
        }

        outColor = vec4(color, 1.0);
